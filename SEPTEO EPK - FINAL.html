document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dEventListener('keydown', this._key);\n    this._scroll = () => { const el = this.prog; if (!el) return; const d = document.scrollingElement || document.documentElement; const max = d.scrollHeight - d.clientHeight; el.style.transform = 'scaleX(' + (max > 0 ? d.scrollTop / max : 0) + ')'; };\n    window.addEventListener('scroll', this._scroll, { passive: true });\n    requestAnimationFrame(() => { this.initReveal(); this.initHypno(); this.initScope(); this.initHUD(); this._scroll(); if (this.kicker) this.scramble(this.kicker); });\n    this.applyAccent();\n  }\n  componentDidUpdate() { this.applyAccent(); }\n  applyAccent() { if (this.root) this.root.style.setProperty('--acc', this.accColor()); }\n  componentWillUnmount() {\n    clearInterval(this.phaseTimer); clearInterval(this._hudT);\n    window.removeEventListener('keydown', this._key);\n    window.removeEventListener('scroll', this._scroll);\n    window.removeEventListener('resize', this._rz);\n    window.removeEventListener('resize', this._rz2);\n    cancelAnimationFrame(this._raf1); cancelAnimationFrame(this._raf2);\n    if (this.io) this.io.disconnect();\n  }\n  accColor() { let a = this.props.accent; if (Array.isArray(a)) a = a[0]; return typeof a === 'string' && a ? a : '#E8380D'; }\n  hexA(a) { const h = this.accColor().replace('#',''); const f = h.length === 3 ? h.split('').map(c => c+c).join('') : h; const n = parseInt(f, 16); return 'rgba(' + ((n>>16)&255) + ',' + ((n>>8)&255) + ',' + (n&255) + ',' + a + ')'; }\n  scramble(el, dur) {\n    if (!el || el.__scr) return; dur = dur || 700;\n    const final = el.textContent; const glyphs = 'ABCDEFGHIJKLMNPQRSTUVWXYZ0123456789/#*·—+='; el.__scr = true;\n    const start = performance.now();\n    const step = (now) => {\n      const p = Math.min(1, (now - start) / dur); const rev = Math.floor(p * final.length); let out = '';\n      for (let i = 0; i < final.length; i++) { const c = final[i]; if (c === ' ' || c === '\\n') { out += c; continue; } out += i < rev ? c : glyphs[(Math.random() * glyphs.length) | 0]; }\n      el.textContent = out;\n      if (p < 1) requestAnimationFrame(step); else { el.textContent = final; el.__scr = false; }\n    };\n    requestAnimationFrame(step);\n  }\n  initHUD() {\n    const start = Date.now();\n    this._hudT = setInterval(() => { const el = this.hud; if (!el) return; const t = (Date.now() - start) / 1000; const pad = (x) => String(x).padStart(2, '0'); const ff = pad(((t * 25) | 0) % 25), s = pad((t | 0) % 60), m = pad(((t / 60) | 0) % 60), hh = pad((t / 3600) | 0); el.textContent = 'REC ' + hh + ':' + m + ':' + s + ':' + ff + '  ·  124.0 BPM  ·  35.47°N 97.51°W'; }, 40);\n  }\n  initHypno() {\n    const cv = this.hypno; if (!cv) return; const ctx = cv.getContext('2d'); const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const resize = () => { const r = cv.getBoundingClientRect(); cv.width = Math.max(1, r.width * dpr); cv.height = Math.max(1, r.height * dpr); };\n    resize(); this._rz = resize; window.addEventListener('resize', resize);\n    const bpm = 124, beat = 60000 / bpm;\n    const draw = (ts) => {\n      const w = cv.width, h = cv.height; ctx.clearRect(0, 0, w, h);\n      const cx = w * 0.5, cy = h * 0.52, maxR = Math.hypot(w, h) * 0.6, bp = (ts % beat) / beat, rings = 16;\n      for (let i = 0; i < rings; i++) { const pr = ((i / rings) + bp) % 1, r = pr * maxR, a = (1 - pr) * 0.11, red = i % 4 === 0; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.strokeStyle = red ? this.hexA(a * 1.3) : 'rgba(244,242,237,' + a + ')'; ctx.lineWidth = dpr * (red ? 1.4 : 0.7); ctx.stroke(); }\n      const lines = 64, rot = ts / 9000; ctx.lineWidth = dpr;\n      for (let i = 0; i < lines; i++) { const ang = rot + i / lines * Math.PI * 2; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(ang) * maxR, cy + Math.sin(ang) * maxR); ctx.strokeStyle = 'rgba(244,242,237,0.010)'; ctx.stroke(); }\n      this._raf1 = requestAnimationFrame(draw);\n    };\n    this._raf1 = requestAnimationFrame(draw);\n  }\n  initScope() {\n    const cv = this.scope; if (!cv) return; const ctx = cv.getContext('2d'); const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const resize = () => { const r = cv.getBoundingClientRect(); cv.width = Math.max(1, r.width * dpr); cv.height = Math.max(1, r.height * dpr); };\n    resize(); this._rz2 = resize; window.addEventListener('resize', resize);\n    const draw = (ts) => {\n      const w = cv.width, h = cv.height, mid = h / 2; ctx.clearRect(0, 0, w, h);\n      ctx.strokeStyle = 'rgba(244,242,237,0.08)'; ctx.lineWidth = dpr; ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(w, mid); ctx.stroke();\n      ctx.beginPath();\n      for (let x = 0; x <= w; x += 2 * dpr) { const t = x / w, env = Math.sin(t * Math.PI); const y = mid + Math.sin(t * Math.PI * 8 + ts / 260) * h * 0.30 * env + Math.sin(t * Math.PI * 22 - ts / 380) * h * 0.08 * env; if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }\n      ctx.strokeStyle = this.hexA(0.95); ctx.lineWidth = dpr * 1.6; ctx.stroke();\n      this._raf2 = requestAnimationFrame(draw);\n    };\n    this._raf2 = requestAnimationFrame(draw);\n  }\n  initReveal() {\n    const root = this.root; if (!root) return;\n    const els = root.querySelectorAll('[data-reveal]');\n    els.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(28px)';\n      el.style.filter = 'blur(8px)';\n      el.style.transition = 'opacity 1s cubic-bezier(.16,1,.3,1), transform 1s cubic-bezier(.16,1,.3,1), filter 1s cubic-bezier(.16,1,.3,1)';\n    });\n    this.io = new IntersectionObserver((entries) => {\n      entries.forEach(en => {\n        if (en.isIntersecting) {\n          const el = en.target;\n          const d = parseInt(el.getAttribute('data-reveal-delay') || '0', 10);\n          setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'none'; el.style.filter = 'none'; const hh = el.querySelector('h2'); if (hh) this.scramble(hh); }, d);\n          this.io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });\n    els.forEach(el => this.io.observe(el));\n  }\n\n  content() {\n    return {\n      es: {\n        kicker: 'ELECTRONIC PRESS KIT — 2026',\n        mOrigin: 'ORIGEN', mBase: 'BASE', mNet: 'RED', mSound: 'SONIDO', mSeries: 'SERIES',\n        scroll: 'DOSSIER',\n        dossier: 'DOSSIER',\n        pressG: 'PRENSA & BOOKING',\n        secBio: 'Biografía', secDates: 'Fechas seleccionadas', secVenues: 'Venues',\n        secBooth: 'Compartió cabina con', secPress: 'Prensa',\n        statA: 'EXTENDED SETS', statB: 'FORMATO', statC: 'SERIES',\n        motif: 'BUCLE — TRES FASES',\n        shortBio: 'Septeo es DJ, productor y curador nacido en Medellín y radicado en Oklahoma City. Co-fundador de BUCLE Collective, lidera la dirección artística del proyecto: una exploración del minimal, el house y el techno hipnótico donde la curaduría pesa más que la tendencia. Sus sets —en digital y en vinilo, incluidos extended sets de más de seis horas— entienden la música como movimiento, energía y concepto.',\n        longBio: 'Detrás de Septeo está Mateo Cardona: DJ, productor y diseñador de software nacido en Medellín y radicado en Oklahoma City. De esa doble vida —código y cabina— sale un enfoque donde el sonido, la estética visual y el diseño de la experiencia funcionan como un solo sistema. Es co-fundador y corazón creativo de BUCLE Collective, la plataforma de música electrónica que conecta OKC con Nueva York y Medellín a través de fiestas de warehouse, podcast y curaduría radical: “Bucle no es una fiesta, es un filtro”. Como curador ha levantado las series WAVE, BLOOM y ELLIPTICAL, llevando el rominimal, el acid y el techno de corte Detroit/Berlín a espacios no convencionales de Oklahoma. Como DJ, su lenguaje es el groove sostenido: sets largos e hipnóticos —incluido un extended set de seis horas en Elliptical— que disuelven el tiempo antes que perseguir el pico fácil. El vinilo es parte central de su identidad de cabina: su Minimal House Vinyl Set (BUCLE Sessions) y su set Haus Under the Sun (HAUSLAB) están disponibles en YouTube.',\n        colophon: 'Compuesto sobre una grilla de 12 columnas según Müller-Brockmann. Negro · blanco · rojo según Vignelli. Display geométrica, grotesca neutra, metadata en monoespaciada. Pulsá G para revelar la grilla.'\n      },\n      en: {\n        kicker: 'ELECTRONIC PRESS KIT — 2026',\n        mOrigin: 'ORIGIN', mBase: 'BASE', mNet: 'NETWORK', mSound: 'SOUND', mSeries: 'SERIES',\n        scroll: 'DOSSIER',\n        dossier: 'DOSSIER',\n        pressG: 'PRESS & BOOKING',\n        secBio: 'Biography', secDates: 'Selected dates', secVenues: 'Venues',\n        secBooth: 'Shared the booth with', secPress: 'Press',\n        statA: 'EXTENDED SETS', statB: 'FORMAT', statC: 'SERIES',\n        motif: 'BUCLE — THREE PHASES',\n        shortBio: 'Septeo is a DJ, producer and curator born in Medellín and based in Oklahoma City. Co-founder of BUCLE Collective, he leads the artistic direction of the project: an exploration of minimal, house and hypnotic techno where curation outweighs trend. His sets — on digital and vinyl, including six-hour-plus extended journeys — approach music as motion, energy and concept.',\n        longBio: 'Behind Septeo is Mateo Cardona: DJ, producer and software designer born in Medellín and based in Oklahoma City. That double life — code and booth — shapes an approach where sound, visual aesthetics and experience design operate as one system. He is co-founder and creative heart of BUCLE Collective, the electronic music platform linking OKC with New York and Medellín through warehouse parties, podcasts and radical curation: “Bucle is not a party, it’s a filter.” As curator he has built the WAVE, BLOOM and ELLIPTICAL series, bringing rominimal, acid and Detroit/Berlin-leaning techno to unconventional spaces across Oklahoma. As a DJ his language is the sustained groove: long, hypnotic sets — including a six-hour extended set at Elliptical — built to dissolve time rather than chase the easy peak. Vinyl is central to his booth identity: his Minimal House Vinyl Set (BUCLE Sessions) and Haus Under the Sun set (HAUSLAB) are available on YouTube.',\n        colophon: 'Set on a 12-column grid after Müller-Brockmann. Black · white · red after Vignelli. Geometric display, neutral grotesque, metadata in monospace. Press G to reveal the grid.'\n      }\n    };\n  }\n\n  renderVals() {\n    const C = this.content();\n    const t = C[this.state.lang];\n    const red = this.accColor(), dim = 'rgba(255,255,255,.35)', dark = 'rgba(10,10,10,.35)';\n    const p = this.state.phase;\n\n    const setBg = (el, on) => { if (!el) return; el.style.background = on ? 'rgba(232,56,13,.06)' : 'transparent'; el.style.paddingLeft = on ? '24px' : '12px'; el.style.boxShadow = on ? 'inset 4px 0 0 var(--acc)' : 'none'; };\n\n    const dates = [\n      { date: '06.06.26', ev: 'ELLIPTICAL — Septeo Extended Set (6 hrs) & Friends', ve: 'The Pet Shop, OKC' },\n      { date: '18.07.26', ev: 'CTRL+VOID — CAGED × BUCLE × ONEAM · 8PM–6AM', ve: 'Warehouse, OKC' },\n      { date: '18.07.26', ev: 'Bucle pres. BLACK DERAOUT — Deraout + Alexandria', ve: 'Mijito Club, Medellín' },\n      { date: '19.07.26', ev: 'BLOOM — con Amiresta · MofAx · Jberi', ve: 'Selva Nightclub, OKC' },\n      { date: '08.08.26', ev: 'WAVE: DAIZY — vinyl set — ClubSpace', ve: 'Secret location, OKC' },\n      { date: '2026', ev: 'Haus Under the Sun × Bucle Takeover — HAUSLAB', ve: 'Rooftop, OKC' },\n      { date: '2025', ev: 'BUCLE Sessions — open air — Bella Mutino', ve: 'Central Park, NYC' }\n    ].map(d => ({ ...d, href: '#s08', enter: (e) => setBg(e.currentTarget, true), leave: (e) => setBg(e.currentTarget, false) }));\n\n    const venues = [\n      { city: 'OKC', items: 'The Pet Shop (Elliptical) · Selva Nightclub · OKC Warehouse · Haus Under the Sun Social Capital (HAUSLAB)' },\n      { city: 'NYC', items: 'Listen, Brooklyn · TBA,
